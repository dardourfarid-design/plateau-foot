name: Baseline de l'historique des migrations (ponctuel)

# À USAGE PONCTUEL — issue #292.
#
# Problème résolu : la table `supabase_migrations.schema_migrations` de la
# production est VIDE, alors que les 40 migrations y sont bel et bien
# appliquées. Cause : elles l'ont toutes été à la main dans le SQL Editor, qui
# exécute le SQL sans jamais enregistrer la version. Supabase ne sait donc pas
# qu'une seule migration a été appliquée, et `db push` en conclut qu'il faut
# tout rejouer depuis 0001.
#
# `migration repair --status applied` écrit la version dans l'historique
# distant SANS exécuter le fichier. C'est exactement ce qu'il faut ici : les
# migrations sont déjà en base, il ne manque que leur trace.
#
# ⚠️ Ne JAMAIS marquer « applied » une migration qui ne l'est pas réellement :
# elle serait sautée définitivement. C'est pourquoi la liste est un paramètre
# explicite et pas une boucle sur le dossier — chaque version passée ici doit
# avoir été constatée en base.
#
# Ce workflow n'a pas vocation à resservir. Une fois l'historique aligné, la
# CI le maintient toute seule (supabase-migrations.yml) : il peut être
# supprimé.

on:
  workflow_dispatch:
    inputs:
      versions:
        description: "Versions à marquer appliquées, séparées par des espaces (ex. 0001 0002 0003)"
        required: true
        type: string
      confirmation:
        description: "Taper BASELINE pour confirmer l'écriture sur la production"
        required: true
        type: string

jobs:
  repair:
    name: Aligner l'historique distant
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Garde-fou : un déclenchement accidentel depuis l'onglet Actions ne
      # doit pas pouvoir écrire sur la prod. La confirmation doit être tapée.
      - name: Vérifier la confirmation
        run: |
          if [ "${{ inputs.confirmation }}" != "BASELINE" ]; then
            echo "::error::Confirmation absente ou incorrecte — taper exactement BASELINE."
            exit 1
          fi

      - uses: actions/checkout@v4

      # Version épinglée, jamais `latest` — voir la note de
      # supabase-migrations.yml (#297) : `latest` interroge l'API GitHub à
      # chaque run et finit par échouer sur un rate limit.
      - uses: supabase/setup-cli@v1
        with:
          version: '2.109.1'

      # Chaque version passée doit correspondre à un fichier réel : une faute
      # de frappe écrirait une version fantôme dans l'historique, que plus rien
      # ne rapprocherait d'un fichier.
      - name: Vérifier que chaque version existe
        run: |
          for v in ${{ inputs.versions }}; do
            if ! ls supabase/migrations/${v}_*.sql >/dev/null 2>&1; then
              echo "::error::Aucune migration ne correspond à la version '${v}'."
              exit 1
            fi
          done
          echo "Toutes les versions correspondent à un fichier."

      - name: Lier le projet de production
        id: lier
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: État de l'historique AVANT
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration list --linked

      - name: Marquer les versions comme appliquées
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration repair --status applied ${{ inputs.versions }}

      # C'est ce tableau qui sert de constat : colonne Remote renseignée pour
      # les versions traitées, vide pour celles délibérément laissées de côté.
      # Conditionné à la réussite du lien : sinon cette étape s'exécutait après
      # un échec amont, échouait à son tour faute de projet lié, et ajoutait
      # une seconde erreur qui masquait la vraie cause.
      - name: État de l'historique APRÈS
        if: always() && steps.lier.outcome == 'success'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration list --linked
