name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Tests unitaires (moteur)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lancer la suite de tests
        run: node tests/run-tests.js
      # #324 : la liste modulepreload d'index.html doit rester le miroir exact
      # du graphe d'imports STATIQUES de main.js. Sans ce contrôle, précharger
      # un module rendu dynamique annulerait silencieusement le chargement
      # paresseux — le code continuerait de marcher, seul le gain disparaîtrait.
      - name: Cohérence modulepreload ↔ graphe d'imports
        run: node tools/check-modulepreload.mjs

  # Le job « Parité src/ ↔ public/src/ » a été retiré : public/src/ est
  # désormais la SOURCE UNIQUE du code applicatif (#20) — il n'y a plus de
  # copie à synchroniser ni de build.js.

  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: npm install
      - name: Installer le navigateur Playwright
        run: npx playwright install --with-deps chromium
      - name: Lancer les tests E2E
        run: npx playwright test
      - name: Publier le rapport en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Ce qui part en production, c'est dist/ (minifié), pas public/. Sans ce job,
  # une casse introduite par la minification passerait toute la CI au vert et
  # n'apparaîtrait qu'en prod. Même suite E2E, servie depuis le build.
  e2e-dist:
    name: E2E sur le build de production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: npm install
      - name: Construire dist/
        run: npm run build
      - name: Installer le navigateur Playwright
        run: npx playwright install --with-deps chromium
      - name: Lancer les tests E2E contre dist/
        env:
          TM_E2E_DIR: dist
        run: npx playwright test
      - name: Publier le rapport en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dist
          path: playwright-report/
          retention-days: 7

  edge:
    name: Tests Edge Functions (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Verrouille la sécurité du crédit rewarded : primitives de signature
      # (round-trip ECDSA réel) + échec fermé du handler (#134).
      # --node-modules-dir=auto : le package.json racine (Playwright/c8) fait
      # sinon exiger un node_modules pré-installé pour les deps npm de
      # jsr:@supabase/supabase-js.
      - name: Tester rewarded-ssv
        run: deno test --allow-env --node-modules-dir=auto supabase/functions/rewarded-ssv/
      # Verrouille la validation serveur des coups en ligne (#260) : rejeu
      # moteur (liste blanche, tours, coups illégaux) via le même code que le
      # client — prouve au passage que le moteur se résout sous Deno.
      - name: Tester push-game-state
        run: deno test --allow-env --node-modules-dir=auto supabase/functions/push-game-state/

  coverage:
    name: Couverture de code (c8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: npm install
      # Échoue si la couverture (public/src/) passe sous les seuils définis
      # dans package.json (#133). Seuils à relever au fil des tests ajoutés.
      - name: Mesurer la couverture
        run: npm run coverage
      - name: Publier le rapport lcov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

  integration:
    name: Intégration Supabase (#128)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22 : WebSocket natif requis par @supabase/supabase-js (realtime).
          node-version: '22'
      - name: Installer les dépendances
        run: npm install
      # Le runner se saute proprement (exit 0) si les secrets sont absents
      # (forks) — il ne teste réellement que sur le repo qui a la branche de test.
      - name: Tests d'intégration
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASS: ${{ secrets.E2E_PASS }}
        run: npm run integration

  e2e-auth:
    name: E2E authentifiés (#129)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: npm install
      - name: Installer Chromium
        run: npx playwright install --with-deps chromium
      # Réécrit config.js pour viser le backend de TEST (jamais la prod), via
      # Node (robuste, pas de piège de heredoc). Vide sur les forks (secrets
      # absents) → les specs se sautent via test.skip.
      - name: Config de test
        env:
          URL: ${{ secrets.TEST_SUPABASE_URL }}
          KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
        run: |
          node -e "const fs=require('fs');const cfg={supabaseUrl:process.env.URL||'',supabaseAnonKey:process.env.KEY||'',ads:{enabled:false,banner:false,interstitial:false,rewarded:false,cmp:{enabled:false,publisherId:null}}};fs.writeFileSync('public/config.js','window.__PLATEAU_FOOT_CONFIG__ = '+JSON.stringify(cfg)+';');console.log('config.js -> '+(process.env.URL?'backend de test':'VIDE (secrets absents)'));"
      - name: Tests E2E authentifiés
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASS: ${{ secrets.E2E_PASS }}
        run: npx playwright test --config playwright.auth.config.js
      - name: Publier le rapport en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-auth
          path: playwright-report/
          retention-days: 7
