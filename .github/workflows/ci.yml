name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Tests unitaires (moteur)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lancer la suite de tests
        run: node tests/run-tests.js

  sync-check:
    name: Parité src/ ↔ public/src/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Régénère public/src/ depuis src/ et échoue si ça produit une différence :
      # garantit qu'on ne peut jamais déployer un public/src/ désynchronisé (#20).
      - name: Régénérer public/src depuis src
        run: node build.js
      - name: Vérifier l'absence de dérive
        run: |
          if ! git diff --quiet -- public/src; then
            echo "::error::public/src/ n'est pas synchronisé avec src/. Lance 'node build.js' puis committe public/src/."
            git --no-pager diff --stat -- public/src
            exit 1
          fi

  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: npm install
      - name: Installer le navigateur Playwright
        run: npx playwright install --with-deps chromium
      - name: Lancer les tests E2E
        run: npx playwright test
      - name: Publier le rapport en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  edge:
    name: Tests Edge Functions (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Verrouille la sécurité du crédit rewarded : primitives de signature
      # (round-trip ECDSA réel) + échec fermé du handler (#134).
      # --node-modules-dir=auto : le package.json racine (Playwright/c8) fait
      # sinon exiger un node_modules pré-installé pour les deps npm de
      # jsr:@supabase/supabase-js.
      - name: Tester rewarded-ssv
        run: deno test --allow-env --node-modules-dir=auto supabase/functions/rewarded-ssv/

  coverage:
    name: Couverture de code (c8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Installer les dépendances
        run: npm install
      # Échoue si la couverture (src/) passe sous les seuils définis dans
      # package.json (#133). Seuils à relever au fil des tests ajoutés.
      - name: Mesurer la couverture
        run: npm run coverage
      - name: Publier le rapport lcov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7
