<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau mot de passe — Tactic Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<style>
body{ display:flex; align-items:center; justify-content:center; min-height:100vh; }
.reset-card{
  max-width: 380px;
  width: 100%;
  margin: 20px;
  padding: 32px;
  background: var(--nuit-clair);
  border-radius: 14px;
  text-align:left;
}
.reset-title{
  font-family:'Barlow Condensed', sans-serif;
  font-weight:800;
  font-size:26px;
  color: var(--craie);
  margin-bottom:8px;
}
.reset-sub{ font-size:13px; color: var(--craie-att); margin-bottom:20px; }
.reset-input{
  width:100%;
  background: var(--nuit);
  border: 1px solid rgba(245,242,232,0.16);
  border-radius:7px;
  padding: 11px 12px;
  color: var(--craie);
  font-family:'Space Grotesk', sans-serif;
  font-size:14px;
  margin-bottom:10px;
}
.reset-feedback{ font-size:13px; min-height:18px; margin-bottom:10px; }
.reset-feedback.error{ color: var(--rouge-equipe-clair); }
.reset-feedback.success{ color: #2E9E4F; }
</style>
</head>
<body>
<div id="langHost" style="position:fixed;top:12px;right:12px;z-index:100;"></div>

<div class="reset-card">
  <div class="reset-title">Nouveau mot de passe</div>
  <p class="reset-sub" id="resetIntro">Choisis un nouveau mot de passe pour ton compte.</p>
  <p class="reset-feedback" id="resetFeedback"></p>
  <input class="reset-input" type="password" id="newPassword" placeholder="Nouveau mot de passe (8 caractères min.)">
  <input class="reset-input" type="password" id="confirmPassword" placeholder="Confirme le mot de passe">
  <button class="btn primary" id="confirmResetBtn" style="width:100%;">Valider</button>
</div>

<script>
const supabase = window.supabase.createClient(
  window.__PLATEAU_FOOT_CONFIG__.supabaseUrl,
  window.__PLATEAU_FOOT_CONFIG__.supabaseAnonKey
);

const feedback = document.getElementById('resetFeedback');
const intro = document.getElementById('resetIntro');
const confirmBtn = document.getElementById('confirmResetBtn');

let recoveryReady = false;

supabase.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') {
    recoveryReady = true;
  }
});

setTimeout(() => {
  if (!recoveryReady) {
    intro.textContent = 'Ce lien semble invalide ou expiré. Demande un nouveau lien depuis l\'écran de connexion.';
    confirmBtn.disabled = true;
    confirmBtn.style.opacity = '0.5';
  }
}, 1500);

confirmBtn.addEventListener('click', async () => {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  feedback.textContent = '';
  feedback.className = 'reset-feedback';

  if (newPassword.length < 8) {
    feedback.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
    feedback.classList.add('error');
    return;
  }
  if (newPassword !== confirmPassword) {
    feedback.textContent = 'Les deux mots de passe ne correspondent pas.';
    feedback.classList.add('error');
    return;
  }

  const { error } = await supabase.auth.updateUser({ password: newPassword });
  if (error) {
    feedback.textContent = error.message || 'Impossible de mettre à jour le mot de passe.';
    feedback.classList.add('error');
    return;
  }

  feedback.textContent = 'Mot de passe mis à jour ! Tu peux retourner sur le jeu et te connecter.';
  feedback.classList.add('success');
  confirmBtn.disabled = true;
  setTimeout(() => { window.location.href = 'index.html'; }, 2500);
});
</script>
<script type="module">
  import { initLang, applyTranslations, startAutoTranslate, mountLangToggle } from './src/ui/i18n.js';
  import './src/ui/i18n-legal-en.js';
  initLang();
  mountLangToggle(document.getElementById('langHost'));
  applyTranslations(document);
  startAutoTranslate();
</script>
</body>
</html>
