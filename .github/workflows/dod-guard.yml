# Garde-fou DoD : quand une issue est fermée, vérifie que sa Definition of Done
# a été passée en revue.
#
# Pourquoi : la passe de vérification du 2026-07-16 a trouvé 4 issues fermées dont le
# DoD n'était pas satisfait (#61 fermée sans rien livrer, #228 avec un bug de départage,
# #181 sans ses balises sémantiques, #203 sans sa ligne dans MIGRATIONS.md). Cause racine :
# rien ne reliait la fermeture d'une issue à la vérification de son DoD, et les cases
# n'étaient jamais cochées (3 issues sur 157) — donc l'état des cases ne voulait rien dire.
#
# Ce que ce workflow N'EST PAS : un bloqueur. Il ne rouvre rien et ne fait échouer aucune
# CI. Il rend juste l'écart visible au moment où il se crée, plutôt que six mois plus tard.
#
# Échappatoires assumées (une case peut légitimement rester décochée) :
#   - fermer en « not planned » (wontfix / duplicate / abandonné) → ignoré ;
#   - label `dod-verifie` posé à la main → ignoré (ex. : points dépendant d'une console
#     externe, constatés hors repo par un humain).

name: Garde-fou DoD

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  check-dod:
    name: Vérifier le DoD à la fermeture
    runs-on: ubuntu-latest
    # « Closed as not planned » = décision assumée d'abandon, pas un oubli de DoD.
    if: github.event.issue.state_reason != 'not_planned'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const { owner, repo } = context.repo;

            const EXEMPT = 'dod-verifie';
            const FLAG = 'dod-non-verifie';

            const labels = (issue.labels || []).map(l => (typeof l === 'string' ? l : l.name));
            if (labels.includes(EXEMPT)) {
              core.info(`#${issue.number} porte le label « ${EXEMPT} » — vérification humaine déjà tracée, on passe.`);
              return;
            }

            const body = issue.body || '';
            const unchecked = body.split('\n').filter(l => /^\s*-\s\[ \]\s/.test(l));
            const checked = body.split('\n').filter(l => /^\s*-\s\[[xX]\]\s/.test(l));

            if (unchecked.length === 0) {
              core.info(`#${issue.number} : aucun point de DoD décoché. Rien à signaler.`);
              // Le label a pu être posé lors d'une fermeture précédente : on nettoie.
              if (labels.includes(FLAG)) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issue.number, name: FLAG
                }).catch(() => {});
              }
              return;
            }

            const total = unchecked.length + checked.length;
            const liste = unchecked.map(l => l.trim()).join('\n');

            const comment = [
              `## ⚠️ Garde-fou DoD — ${unchecked.length} point(s) sur ${total} non coché(s)`,
              ``,
              `Cette issue vient d'être fermée alors que son DoD comporte des points non cochés :`,
              ``,
              liste,
              ``,
              `**Ce n'est pas bloquant** — l'issue reste fermée. Mais l'un de ces trois cas s'applique,`,
              `et il vaut mieux le trancher maintenant :`,
              ``,
              `1. **C'est fait, on a juste oublié de cocher** → coche les cases (une case cochée doit`,
              `   vouloir dire « j'ai constaté », pas « ça devrait marcher »), puis pose le label`,
              `   \`${EXEMPT}\` pour faire taire ce garde-fou.`,
              `2. **Ça dépend d'une action externe** (console Google, Dashboard Supabase, vérif sur`,
              `   device…) que tu as faite hors du repo → dis-le en commentaire et pose \`${EXEMPT}\`.`,
              `3. **Ce n'est pas fait** → rouvre l'issue, ou ouvre une issue de suivi qui référence`,
              `   celle-ci. C'est le cas que ce garde-fou existe pour attraper.`,
              ``,
              `<sub>Pourquoi ce workflow : une passe du 2026-07-16 a trouvé 4 issues fermées sans DoD`,
              `satisfait — dont #61, fermée sans qu'une seule ligne soit livrée. Voir`,
              `\`.github/workflows/dod-guard.yml\`. Pour abandonner une issue sans déclencher ce`,
              `message, ferme-la en « **Closed as not planned** ».</sub>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.number, body: comment
            });

            await github.rest.issues.addLabels({
              owner, repo, issue_number: issue.number, labels: [FLAG]
            });

            core.warning(`#${issue.number} fermée avec ${unchecked.length}/${total} point(s) de DoD non coché(s).`);
