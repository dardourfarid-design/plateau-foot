<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" role="img" aria-label="">
  <!-- #230 — Tireur, style shōnen sport (encrage épais, cel-shading, pose de
       frappe). Illustration ORIGINALE : on s'inspire du genre manga sportif,
       jamais d'un personnage existant (cf. choix produit « joueurs fictifs »).
       Vue de dos, trois-quarts : c'est l'angle du joueur qui tire vers la cage. -->
  <defs>
    <style>
      .ink   { fill:none; stroke:#12131a; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; }
      .ink-t { fill:none; stroke:#12131a; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
      .kit   { fill:#3f7bd8; }
      .kit-s { fill:#2d5aa5; }
      .skin  { fill:#f0c090; }
      .skin-s{ fill:#d9a273; }
      .hair  { fill:#1b1c24; }
      .sock  { fill:#22304d; }
      .boot  { fill:#f5c542; }
      .out   { fill:#12131a; }
    </style>
  </defs>

  <!-- jambe d'appui -->
  <path class="out" d="M96 176c-4 22-6 40-5 58 1 8 2 14 4 20l16-2c-2-8-3-16-3-24 0-16 2-32 5-50z"/>
  <path class="skin" d="M99 180c-3 20-5 37-4 53 1 7 2 12 3 17l9-1c-1-6-2-13-2-21 0-15 2-31 5-47z"/>
  <path class="sock" d="M95 236c-1 8-1 16 0 23 1 6 2 11 3 15l16-2c-2-7-3-14-3-21 0-5 0-10 1-15z"/>
  <path class="boot" d="M96 272c1 6 2 10 3 13l20-2 3-9-25-4z"/>
  <path class="ink-t" d="M96 272c1 6 2 10 3 13l20-2 3-9"/>

  <!-- jambe de frappe : tendue vers le ballon, moteur de la pose -->
  <path class="out" d="M112 178c10 16 24 30 40 40l14 8-9 16-16-9c-20-12-36-28-46-46z"/>
  <path class="skin" d="M115 184c9 14 22 27 37 36l10 6-4 8-12-7c-17-10-31-25-40-41z"/>
  <path class="sock" d="M143 213c8 7 17 13 26 18l7 4-9 16-8-5c-9-5-18-12-26-19z"/>
  <path class="boot" d="M166 235l10 6-9 16-11-6z"/>
  <path class="ink-t" d="M166 235l10 6-9 16-11-6z"/>

  <!-- torse / maillot -->
  <path class="out" d="M76 92c-8 6-12 16-13 28-2 20 0 42 4 60l38 2c4-20 6-42 6-62 0-12-3-22-9-28-8-8-18-8-26 0z"/>
  <path class="kit" d="M79 98c-6 5-9 14-10 24-2 18 0 38 3 55l28 1c3-18 5-38 5-56 0-11-2-20-7-25-6-6-13-6-19 1z"/>
  <path class="kit-s" d="M96 98c4 5 6 14 6 24 0 18-2 38-5 55l9 1c3-18 5-38 5-56 0-11-2-20-7-25-2-2-5-3-8 1z"/>
  <!-- numéro 10, marqueur d'univers (fictif, aucune référence réelle) -->
  <text x="88" y="140" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#fff" text-anchor="middle">10</text>

  <!-- bras d'équilibre gauche, lancé en arrière -->
  <path class="out" d="M70 104c-12 6-22 16-28 28l-6 14 15 7 6-13c5-10 12-17 21-22z"/>
  <path class="skin" d="M69 111c-9 6-17 14-22 24l-4 9 5 2 4-9c5-9 12-16 20-21z"/>
  <path class="skin" d="M36 146l15 7-4 9-15-7z"/>

  <!-- bras droit -->
  <path class="out" d="M116 104c12 4 22 12 30 22l8 12-14 9-8-12c-6-8-13-14-21-17z"/>
  <path class="skin" d="M118 111c9 4 17 11 24 20l5 8-5 3-5-8c-6-8-13-14-21-18z"/>
  <path class="skin" d="M140 138l14 9-8 11-13-8z"/>

  <!-- tête (de dos/trois-quarts) + cheveux en pics -->
  <circle class="out" cx="95" cy="66" r="26"/>
  <circle class="skin" cx="95" cy="66" r="22"/>
  <path class="skin-s" d="M105 48a22 22 0 0 1 0 36 26 26 0 0 0 0-36z"/>
  <path class="out" d="M70 62c-2-18 10-32 26-32s27 13 26 30c-4-8-10-12-18-13 3 4 3 8 1 11-4-7-12-11-21-10-6 1-11 6-14 14z"/>
  <path class="hair" d="M73 60c-1-15 9-27 23-27s24 11 23 25c-5-6-11-9-18-9 2 3 2 6 0 9-5-6-12-9-19-8-5 1-8 4-9 10z"/>
  <!-- mèches -->
  <path class="hair" d="M119 40l14-10-6 15zM72 42l-14-9 5 15z"/>

  <!-- ombre portée gérée par .pk-fig-shadow côté CSS -->
</svg>
