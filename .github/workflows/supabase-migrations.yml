name: Migrations Supabase

# Objectif (#283) : faire de la CI le SEUL chemin d'application des migrations.
#
# Pourquoi ce workflow existe alors que l'intégration GitHub ↔ Supabase est
# connectée : le check « Supabase Preview » est en `skipping` sur les PR (le
# branching exige le plan Pro), donc rien ne s'applique automatiquement — d'où
# 0038/0039 appliquées à la main. Ce workflow est l'« alternative sans plan
# Pro » décrite dans docs/supabase-branching.md, en version automatisée.
#
# Deux jobs, volontairement distincts :
#   - `replay` : rejoue TOUTE la chaîne de zéro sur un Postgres local jetable.
#     Aucun secret, donc fonctionne aussi sur les forks. C'est le test de
#     rejouabilité exigé par #17.
#   - `push`   : applique les migrations en attente sur la prod, sur `main`
#     uniquement, après merge.

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrations.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'

# Deux applications concurrentes sur la même base sont un moyen sûr de la
# laisser dans un état incohérent : on sérialise.
concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  replay:
    name: Rejeu de la chaîne de zéro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # `supabase start` applique déjà la chaîne ; `db reset` la rejoue
      # explicitement depuis 0001 pour que l'échec soit lisible et attribuable
      # à une migration précise.
      - name: Démarrer une base locale jetable
        run: supabase start -x studio,imgproxy,logflare,vector,edge-runtime

      - name: Rejouer toutes les migrations depuis 0001
        run: supabase db reset --debug

      - name: Arrêter la base locale
        if: always()
        run: supabase stop --no-backup

  push:
    name: Appliquer les migrations en attente (prod)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: replay
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Sans les secrets, `db push` échouerait avec un message d'authentification
      # peu parlant. On préfère un échec explicite qui dit quoi configurer.
      - name: Vérifier la présence des secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=""
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "$SUPABASE_PROJECT_REF" ]  && missing="$missing SUPABASE_PROJECT_REF"
          [ -z "$SUPABASE_DB_PASSWORD" ]  && missing="$missing SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Secrets manquants :$missing — voir supabase/MIGRATIONS.md"
            exit 1
          fi

      - name: Lier le projet de production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      # Trace de ce qui VA être appliqué, avant de l'appliquer : en cas
      # d'incident, le log du run dit exactement ce qui a bougé.
      - name: Lister les migrations en attente
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration list --linked

      - name: Appliquer
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --include-all

      - name: État final de la chaîne
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase migration list --linked
