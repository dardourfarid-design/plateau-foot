<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" role="img" aria-label="">
  <!-- #230 — Gardien, style shōnen sport (encrage épais, cel-shading).
       Illustration ORIGINALE inspirée du GENRE manga sportif, jamais d'un
       personnage existant (cf. choix produit « joueurs fictifs »).
       Pose de face, bras grands ouverts : c'est cette silhouette que le JS fait
       pivoter/translater pour matérialiser les plongeons (pkSetKeeper). -->
  <defs>
    <style>
      .kink  { fill:none; stroke:#12131a; stroke-width:6; stroke-linecap:round; stroke-linejoin:round; }
      .kout  { fill:#12131a; }
      .kkit  { fill:#3ec98a; }
      .kkit-s{ fill:#2b9c68; }
      .kskin { fill:#f0c090; }
      .kskin-s{ fill:#d9a273; }
      .khair { fill:#2a1a10; }
      .kglove{ fill:#f5c542; }
      .kshort{ fill:#1f2a3d; }
      .ksock { fill:#2b9c68; }
    </style>
  </defs>

  <!-- jambes écartées, appui prêt à détendre -->
  <path class="kout" d="M84 182c-6 24-12 44-22 62l-8 14 17 10 9-16c11-20 18-42 24-66z"/>
  <path class="kshort" d="M86 186c-4 16-9 31-15 45l14 7c6-15 11-31 15-48z"/>
  <path class="ksock" d="M71 231c-5 12-11 23-17 33l-4 7 17 10 4-8c6-11 11-22 15-34z"/>
  <path class="kout" d="M116 182c6 24 12 44 22 62l8 14-17 10-9-16c-11-20-18-42-24-66z"/>
  <path class="kshort" d="M114 186c4 16 9 31 15 45l-14 7c-6-15-11-31-15-48z"/>
  <path class="ksock" d="M129 231c5 12 11 23 17 33l4 7-17 10-4-8c-6-11-11-22-15-34z"/>

  <!-- torse -->
  <path class="kout" d="M78 96c-9 6-14 17-15 30-2 22 0 42 4 60h66c4-18 6-38 4-60-1-13-6-24-15-30-14-9-30-9-44 0z"/>
  <path class="kkit" d="M81 102c-7 5-11 15-12 26-2 20 0 38 3 54h56c3-16 5-34 3-54-1-11-5-21-12-26-11-7-27-7-38 0z"/>
  <path class="kkit-s" d="M100 99c11 0 20 3 26 9 5 5 8 14 9 24 2 20 0 38-3 54h-9c3-16 5-34 3-54-1-11-5-21-12-26-4-3-9-5-14-6z"/>

  <!-- bras grands ouverts -->
  <path class="kout" d="M74 106c-16 2-31 10-44 22l-14 14 13 14 13-13c10-9 21-15 33-17z"/>
  <path class="kkit" d="M74 113c-13 3-26 10-37 20l-9 9 4 5 9-9c10-9 21-15 34-19z"/>
  <path class="kout" d="M126 106c16 2 31 10 44 22l14 14-13 14-13-13c-10-9-21-15-33-17z"/>
  <path class="kkit" d="M126 113c13 3 26 10 37 20l9 9-4 5-9-9c-10-9-21-15-34-19z"/>

  <!-- gants (le point de contact : ils doivent se lire d'un coup d'œil) -->
  <path class="kout" d="M16 138c-8 2-13 8-13 16 0 9 7 16 16 16 8 0 14-5 16-13z"/>
  <path class="kglove" d="M18 145c-5 2-8 6-8 10 0 6 5 10 11 10 4 0 8-2 10-6z"/>
  <path class="kout" d="M184 138c8 2 13 8 13 16 0 9-7 16-16 16-8 0-14-5-16-13z"/>
  <path class="kglove" d="M182 145c5 2 8 6 8 10 0 6-5 10-11 10-4 0-8-2-10-6z"/>

  <!-- tête -->
  <circle class="kout" cx="100" cy="70" r="27"/>
  <circle class="kskin" cx="100" cy="70" r="23"/>
  <path class="kskin-s" d="M110 50a23 23 0 0 1 0 40 27 27 0 0 0 0-40z"/>
  <!-- yeux déterminés (shōnen : gros traits, peu de détail) -->
  <path class="kout" d="M88 66l9 4-9 4zM112 66l-9 4 9 4z"/>
  <path class="kink" d="M94 84c4 2 8 2 12 0"/>
  <!-- cheveux en pics -->
  <path class="kout" d="M74 66c-2-19 11-34 26-34s28 14 26 32c-4-9-11-13-19-14 3 4 3 8 1 12-5-8-13-12-22-11-6 1-11 6-12 15z"/>
  <path class="khair" d="M77 64c-1-16 10-29 23-29s25 12 24 27c-5-7-12-10-19-10 2 3 2 6 0 9-5-6-13-9-20-8-5 1-7 5-8 11z"/>
  <path class="khair" d="M124 42l15-11-7 17zM75 44l-15-10 6 17z"/>
</svg>
